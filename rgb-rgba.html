<html>
  <head>
    <title>rgb-rgba</title>
  </head>
  <style>
    .rgb-red {
      color: rgb(255, 0, 0);
    }
    .rgb-green {
      color: rgb(0, 255, 0);
    }
    .rgb-blue {
      color: rgb(0, 0, 255);
    }
    .rgb-all {
      color: rgb(255, 165, 0);
    }
    .rgba-red {
      color: rgba(255, 0, 0, 0.5);
    }
    .rgba-green {
      color: rgba(0, 255, 0, 0.3);
    }
    .rgba-blue {
      color: rgba(0, 0, 255, 0.7);
    }
    .rgba-all {
      color: rgba(255, 165, 0, 0.5);
    }
  </style>
  <body>
    <h1>RGB</h1>
    <h2 class="rgb-red">RGB-red</h2>
    <h2 class="rgb-green">RGB-green</h2>
    <h2 class="rgb-blue">RGB-blue</h2>
    <h2 class="rgb-all">RGB-all(RGB-all, with no orange transperency)</h2>

    <h1>RGBA</h1>
    <h2 class="rgba-red">RGBA-red</h2>
    <h2 class="rgba-green">RGBA-green</h2>
    <h2 class="rgba-blue">RGBA-blue</h2>
    <h2 class="rgba-all">RGBA-all(RGBA-all, with orange transperency)</h2>
  </body>
</html>
