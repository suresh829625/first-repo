<html>
  <head>
    <title>div examples</title>
    <style>
      .container {
        color: red;
      }
      .card {
        color: green;
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <!--1.normal div container (no grouping)-->
    <h2>normal container</h2>
    <div class="container">
      <p>this is just a container</p>
    </div>

    <!--2.grouped elements-->
    <h2>grouped elements(card)</h2>

    <div class="card">
      <h3>product name</h3>
      <p>price : 10000</p>
    </div>
  </body>
</html>
