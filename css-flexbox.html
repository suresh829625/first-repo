<html>
  <head>
    <title>CSS Flexbox</title>
    <style>
      .One {
        width: 200px;
        height: 200px;
        background-color: aqua;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .Two {
        width: 200px;
        height: 200px;
        background-color: rgb(255, 0, 0);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .three {
        width: 200px;
        height: 200px;
        background-color: rgb(0, 255, 0);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .four {
        width: 200px;
        height: 200px;
        background-color: rgb(0, 0, 255);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .five {
        width: 200px;
        height: 200px;
        background-color: rgb(110, 170, 150);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .six {
        width: 200px;
        height: 200px;
        background-color: rgb(100, 150, 100);
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .main {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        height: 100vh;
        border: 4px solid black;
        justify-content: center;
        align-items: end;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="One">1</div>
      <div class="Two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
      <div class="five">5</div>
      <div class="six">6</div>
    </div>
  </body>
</html>
