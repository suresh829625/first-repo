<html>
  <head>
    <title>CSS Height and Width</title>
    <style>
      .One {
        height: 400px;
        width: 800px;
        background-color: aqua;
        border: 2px solid black;
      }
      .Two {
        height: 400px;
        width: 800px;
        background-color: rgb(20, 190, 49);
        border: 2px solid black;
      }
    </style>
  </head>
  <body>
    <div class="one">One</div>
    <div class="two">Two</div>
  </body>
</html>
