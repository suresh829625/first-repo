<html>
  <head>
    <title>CSS-Specificity</title>
    <style>
      #para {
        color: pink;
      }
      .class {
        color: green;
      }
      p {
        color: brown !important;
      }
    </style>
  </head>
  <body>
    <p id="para" class="new" style="color: blue">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Ratione
      laudantium animi aperiam tenetur, excepturi sapiente perspiciatis
      temporibus commodi nam, ducimus provident beatae id molestiae quaerat
      ipsum, ipsam obcaecati dolorem illum.
    </p>
  </body>
</html>
