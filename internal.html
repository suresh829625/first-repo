<html>
  <head>
    <title>class selector example</title>
    <style>
      .title {
        color: red;
      }
      .text {
        color: aqua;
      }
    </style>
  </head>
  <body>
    <h1 class="title">internal css using class</h1>

    <p class="text">this paragraph is styled using class selector</p>
  </body>
</html>
