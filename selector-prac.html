<html>
  <head>
    <title>Selector practice</title>
  </head>
  <style>
    h1 {
      color: red;
    }
    .line {
      color: blue;
    }
    #pretty {
      color: green;
    }
    h2,
    p {
      color: pink;
    }
    /* 
    * {
      color: aqua;
      background-color: red;
    }*/
  </style>
  <body>
    <h1>this refers to elements selector</h1>
    <h2>this line refers to groups selector</h2>
    <h2 class="line">this line refers to class selector</h2>
    <p>this line refers to group selector</p>
    <p id="pretty">this line refers to id selector</p>
  </body>
</html>
